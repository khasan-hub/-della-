<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Our Love 💖</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#0f0f1a;color:white;overflow-x:hidden;}
#login{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;position:relative;z-index:100;}
input,button{padding:10px;border-radius:20px;border:none;}
button{background:#ff4d88;color:white;margin-top:10px;cursor:pointer;}
nav{display:flex;justify-content:center;gap:20px;padding:15px;background:rgba(255,255,255,0.1);position:sticky;top:0;z-index:10;}
nav a{cursor:pointer;color:white;text-decoration:none;font-weight:bold;}
.page{display:none;padding:20px;text-align:center;}
.active{display:block;}
.heart{position:fixed;animation:float 5s linear;font-size:25px;}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);}100%{transform:translateY(-10vh) rotate(360deg);}}
.big-love{position:fixed;font-size:200px;color:rgba(255,0,128,0.1);top:50%;left:50%;transform:translate(-50%,-50%);animation:beat 2s infinite;z-index:0;}
@keyframes beat{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.1);}}
.corner-love{position:fixed;font-size:30px;z-index:50;animation:corner-beat 2s infinite;}
@keyframes corner-beat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(0,0) scale(1.3);}}
.chat{max-width:300px;margin:auto;text-align:left;}
.bubble{background:#25D366;padding:10px;border-radius:15px;margin:5px;width:fit-content;}
.me{background:#128C7E;margin-left:auto;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:15px;padding:20px;}
.photo{background:rgba(255,255,255,0.1);height:120px;border-radius:15px;display:flex;justify-content:center;align-items:center;overflow:hidden;cursor:pointer;transition:0.3s;position:relative;}
.photo:hover{transform:scale(1.05);}
.photo img{width:100%;height:100%;object-fit:cover;}
.photo.empty{font-size:30px;color:#aaa;}
.photo .label{position:absolute;bottom:5px;width:100%;text-align:center;font-weight:bold;color:white;text-shadow:0 0 5px black;}
.photo.bug{background:#333;color:#f00;cursor:not-allowed;}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:20px;}
.home-grid img{width:100%;height:100px;object-fit:cover;border-radius:10px;}
.love-page{height:80vh;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.folder-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:20px;min-height:300px;border:2px dashed #ff4d88;padding:10px;border-radius:15px;}
.folder-container div{height:80px;background:rgba(255,255,255,0.1);border-radius:10px;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.folder-container div video,img{width:90%;height:50px;object-fit:cover;margin:2px 0;}
</style>
</head>
<body>
<div class="big-love">❤️</div>
<div id="corner-love" class="corner-love" style="top:10px; right:10px;">❤️</div>

<!-- LOGIN -->
<div id="login">
  <h2>💖 Masukkan Password 💖</h2>
  <input type="password" id="pass" placeholder="Masukkan password" onkeypress="if(event.key==='Enter'){checkPassword();}">
  <button id="login-btn">Masuk</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">
<nav>
  <a onclick="show('home')">Home</a>
  <a onclick="show('video')">Video</a>
  <a onclick="show('chat')">Chat</a>
  <a onclick="show('gallery')">Gallery</a>
  <a onclick="show('gift')">Gift</a>
  <a onclick="show('love')">💖</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h1>💖 Our Love Story</h1>
  <button onclick="love()">Klik Aku 💕</button>
  <div class="home-grid">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
    <img src="foto5.jpg">
    <img src="foto6.jpg">
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <h1>💬 Chat Kita Dulu</h1>
  <div class="chat">
    <div class="bubble">Hai kamu 😊</div>
    <div class="bubble me">Hai juga ❤️</div>
    <div class="bubble">Kangen...</div>
    <div class="bubble me">Aku juga 🥺</div>
    <div class="bubble">lov u selamanya</div>
    <div class="bubble me">selamanya milik della </div>
  </div>
</div>

<!-- LOVE PAGE -->
<div id="love" class="page">
  <div class="love-page">
    <h1>Will You Stay With Me? 💖</h1>
    <button onclick="yes()">Yes 💕</button>
    <button onclick="no()">No 😢</button>
    <p id="result"></p>
  </div>
</div>

<!-- VIDEO -->
<div id="video" class="page">
  <h2>🎥 Folder Video</h2>
  <div class="gallery-grid" id="video-folders"></div>
</div>

<!-- GALLERY -->
<div id="gallery" class="page">
  <h2>📂 Gallery</h2>
  <div class="gallery-grid" id="gallery-folders"></div>
</div>

<!-- GIFT -->
<div id="gift" class="page">
  <h2>🎁 Gift Video</h2>
  <div class="gallery-grid" id="gift-folders"></div>
</div>

<div id="albums-container"></div>

<script>
// PASSWORD
function checkPassword(){
  const val=document.getElementById("pass").value.trim();
  if(val==="milikdella"){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
  }else{alert("Salah 😢");}
}
document.getElementById("login-btn").addEventListener("click",checkPassword);

// NAV
function show(id){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
}

// LOVE ANIMASI
function love(){
  for(let i=0;i<20;i++){
    let h=document.createElement("div");
    h.innerText="💖";
    h.className="heart";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }
}

// LOVE PAGE
function yes(){document.getElementById("result").innerText="Aku sayang kamu selamanya 💖";}
function no(){document.getElementById("result").innerText="Yakin? 😢 coba pikir lagi...";}

// CORNER LOVE
let cornerLove=document.getElementById("corner-love");
let dx=1,dy=1,px=10,py=10;
function moveCornerLove(){
  const w=window.innerWidth-40,h=window.innerHeight-40;
  px+=dx; py+=dy;
  if(px<10||px>w) dx*=-1;
  if(py<10||py>h) dy*=-1;
  cornerLove.style.left=px+'px'; cornerLove.style.top=py+'px';
  requestAnimationFrame(moveCornerLove);
}
moveCornerLove();

// CREATE FOLDER FUNCTION
const albumsContainer=document.getElementById("albums-container");
function createFolder(id,type,bug=false){
  let div=document.createElement("div");
  div.id=id; div.className="page";
  div.innerHTML=`<button onclick="show('${type}')">⬅ Kembali</button>
  <h2>${id}${bug?' (BUG)':''}</h2>
  <div class="folder-container" id="${id}-container"></div>`;
  albumsContainer.appendChild(div);

  // Fill dummy images/videos
  const container=document.getElementById(`${id}-container`);
  for(let i=1;i<=8;i++){
    let slot=document.createElement("div");
    if(type==="video" || id.startsWith("gift")){
      let v=document.createElement("video");
      v.src="video"+i+".mp4"; v.controls=true;
      slot.appendChild(v);
    }
    let img=document.createElement("img");
    img.src="https://uploads.onecompiler.io/44hfc7byy/44hf9hygk/IMG-20260321-WA0133.jpg";
    slot.appendChild(img);
    container.appendChild(slot);
  }
}

// VIDEO FOLDERS
const videoFolders=document.getElementById("video-folders");
for(let i=1;i<=5;i++){
  let d=document.createElement("div");
  d.className="photo";
  d.innerHTML=`<div class="label">Video ${i}${(i===2||i===5)?' (BUG)':''}</div>`;
  if(i===2||i===5){d.classList.add('bug');}
  else d.onclick=()=>openFolder("video"+i,"video");
  videoFolders.appendChild(d);
  createFolder("video"+i,"video",i===2||i===5);
}

// GALLERY FOLDERS
const galleryFolders=document.getElementById("gallery-folders");
for(let i=1;i<=10;i++){
  let d=document.createElement("div");
  d.className="photo";
  d.innerHTML=`<div class="label">Album ${i}${(i===2||i===5)?' (BUG)':''}</div>`;
  if(i===2||i===5){d.classList.add('bug');}
  else d.onclick=()=>openFolder("album"+i,"gallery");
  galleryFolders.appendChild(d);
  createFolder("album"+i,"gallery",i===2||i===5);
}

// GIFT FOLDERS
const giftFolders=document.getElementById("gift-folders");
for(let i=1;i<=4;i++){
  let d=document.createElement("div");
  d.className="photo";
  d.innerHTML=`<div class="label">Gift ${i}</div>`;
  d.onclick=()=>openFolder("gift"+i,"gift");
  giftFolders.appendChild(d);
  createFolder("gift"+i,"video");
}

// OPEN FOLDER
function openFolder(id,type){show(id);}
</script>
</body>
</html>
